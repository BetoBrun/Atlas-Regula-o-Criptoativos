name: Daily Crypto Regulation Update

on:
  schedule:
    - cron: '20 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run pipeline
        run: |
          python scripts/run_pipeline.py
      - name: Commit updated API data
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add api
          git diff --cached --quiet || git commit -m 'chore: daily regulation update'
          git push
